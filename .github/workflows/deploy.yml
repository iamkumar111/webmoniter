name: Deploy UptimeRobot

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /home/webmoniter/htdocs/webmoniter.online/webmoniter

            echo "⬇️ Pull latest code"
            git pull origin master

            echo "📦 Install dependencies"
            npm install

            echo "🧬 Prisma generate"
            npx prisma generate

            echo "🧱 Prisma DB sync"
            npx prisma db push

            echo "🏗️ Build Next.js app"
            npm run build

            echo "🚀 Restart PM2"
            pm2 startOrRestart ecosystem.config.js --env production

            echo "💾 Save PM2"
            pm2 save
